name: Deploy docs

on:
  push:
    branches: [main]
  # triggered by kairosis/kairosis when connectors/ or events/ change
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Checkout kairosis (for connector + event sources)
        uses: actions/checkout@v4
        with:
          repository: kairosis/kairosis
          path: _kairosis
          token: ${{ secrets.KAIROSIS_READ_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync connector and event docs
        run: npm run sync
        env:
          CONNECTORS_PATH: _kairosis/connectors
          EVENTS_PATH: _kairosis/events

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
