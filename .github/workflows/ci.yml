name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Checkout kairosis (for connector + event sources)
        uses: actions/checkout@v4
        with:
          repository: kairosis/kairosis
          path: _kairosis

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync connector and event docs
        run: npm run sync
        env:
          CONNECTORS_PATH: _kairosis/connectors
          EVENTS_PATH: _kairosis/events

      - name: Build
        run: npm run build
